name: Secrets

on:
  - push
  - pull_request

jobs:
  verify:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write # Required for passwordless npm publishing

    concurrency:
      group: ${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install packages
        run: |
          npm ci --ignore-scripts

      - name: Security audit
        run: npm audit --audit-level=moderate --omit=dev

      - name: Format check
        run: npm run format

      - name: Lint check
        run: npm run lint

      - name: Spell check
        run: npm run spell

      - name: Test
        run: npm run test:ci

      - name: Release
        run: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
